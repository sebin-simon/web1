<svg width="800" height="580" viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!-- NO background rect — fully transparent -->

  <!-- ── SUN ARC ── coral semicircle, clean and bold -->
  <path
    d="M 210 310 A 190 190 0 0 1 590 310"
    fill="none"
    stroke="#E8643A"
    stroke-width="38"
    stroke-linecap="round"
  />

  <!-- ── HORIZON BAND ── navy arc sweep, tapers at ends -->
  <path
    d="M 80 330 Q 400 240 720 330"
    fill="none"
    stroke="#1D3557"
    stroke-width="28"
    stroke-linecap="round"
  />

  <!-- ── S-CURVE TREND LINE ── smooth wave crossing the horizon -->
  <!-- Starts bottom-left, rises through center, levels at top-right -->
  <path
    d="M 190 390 C 240 390, 280 270, 360 270 S 480 210, 560 210"
    fill="none"
    stroke="#E8643A"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Endpoint dot — left (start of trend line) -->
  <circle cx="190" cy="390" r="13" fill="#E8643A" />
  <circle cx="190" cy="390" r="5"  fill="#1D3557" />

  <!-- Endpoint dot — right (end of trend line) -->
  <circle cx="560" cy="210" r="13" fill="#E8643A" />
  <circle cx="560" cy="210" r="5"  fill="#1D3557" />

  <!-- ── COMPANY NAME ── nexKind, mixed weight -->
  <text
    x="400"
    y="490"
    text-anchor="middle"
    font-family="'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="#1D3557"
    letter-spacing="-2"
  >
    <tspan font-weight="300">nex</tspan>Kind
  </text>

  <!-- ── TAGLINE ── sentence case, light weight, medium gray -->
  <text
    x="400"
    y="540"
    text-anchor="middle"
    font-family="'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="#7A8499"
    letter-spacing="3"
  >Vision Beyond the Horizon</text>

</svg>
